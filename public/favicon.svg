<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="3" y="3" width="58" height="58" rx="11" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="17" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="bold" fill="white" filter="url(#shadow)" letter-spacing="-1">S</text>
  <text x="35" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="bold" fill="rgba(255,255,255,0.7)" filter="url(#shadow)" letter-spacing="-1">K</text>
  <line x1="12" y1="50" x2="52" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
</svg>